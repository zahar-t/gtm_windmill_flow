name: GTM Engine CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    name: Deterministic test suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run deterministic test suite
        # LLM/G-Eval tests auto-skip without ANTHROPIC_API_KEY.
        run: pytest -q

      - name: Verify demo pipeline invariant
        run: python -m scripts.run_pipeline --demo
